{% extends 'base.html' %}
{% block title %}Login — ReliefChain{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h2>Welcome Back 👋</h2>
            <p>Sign in to your ReliefChain account</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Sign In →</button>
        </form>
        <div class="auth-divider">or</div>
        <div style="text-align:center;font-size:0.875rem;">
            <span class="text-muted">Don't have an account?</span>
            <a href="{{ url_for('signup') }}" style="color:var(--accent);font-weight:600;"> Sign up free</a>
        </div>
        <div class="divider"></div>
        <div style="background:var(--accent-light);border-radius:8px;padding:1rem;font-size:0.825rem;">
            <strong>Demo Credentials:</strong><br>
            🛡️ Admin: <code>admin@reliefchain.in</code> / <code>admin123</code><br>
            <a href="{{ url_for('admin_login') }}" style="color:var(--accent);">→ Go to Admin Login</a>
        </div>
    </div>
</div>
{% endblock %}
